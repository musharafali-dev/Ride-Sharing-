name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8

    - name: Run Black formatter check
      run: black --check backend/app backend/seed_data.py

    - name: Run Isort imports check
      run: isort --check-only backend/app backend/seed_data.py

    - name: Run Flake8 linter
      run: flake8 backend/app backend/seed_data.py --max-line-length=120 --ignore=E203,W503,F401,E501,E712,F811
